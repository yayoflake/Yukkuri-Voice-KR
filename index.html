<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>윳쿠리 보이스 (한국어)</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>🗣️</text></svg>" />
<style>
  :root { --bg:#f4f1ea; --card:#fffdf7; --accent:#d96a4a; --accent2:#b5532f; --line:#e3ddcf; --text:#332f29; --muted:#8a8378; }
  * { box-sizing: border-box; }
  body {
    margin:0; min-height:100vh; display:flex; align-items:center; justify-content:center;
    background:var(--bg); color:var(--text);
    font-family:"Segoe UI","Malgun Gothic","Apple SD Gothic Neo",sans-serif;
    padding:24px;
  }
  .card {
    width:100%; max-width:560px; background:var(--card); border:1px solid var(--line);
    border-radius:16px; padding:28px 26px; box-shadow:0 8px 30px rgba(0,0,0,.06);
  }
  h1 { margin:0 0 4px; font-size:22px; }
  .sub { margin:0 0 20px; color:var(--muted); font-size:13px; }
  label { display:block; font-size:13px; font-weight:600; margin:14px 0 6px; }
  textarea {
    width:100%; min-height:96px; resize:vertical; padding:12px 14px; font-size:16px;
    border:1px solid var(--line); border-radius:10px; background:#fff; color:var(--text);
    font-family:inherit; line-height:1.5;
  }
  textarea:focus, select:focus { outline:2px solid var(--accent); outline-offset:1px; }
  .row { display:flex; gap:14px; flex-wrap:wrap; align-items:flex-end; margin-top:6px; }
  .row > div { flex:1 1 140px; }
  select, input[type=range] { width:100%; }
  select {
    padding:9px 10px; border:1px solid var(--line); border-radius:10px; background:#fff;
    font-size:14px; color:var(--text);
  }
  .speedval { color:var(--muted); font-weight:400; }
  button {
    margin-top:18px; width:100%; padding:13px; font-size:16px; font-weight:700;
    color:#fff; background:var(--accent); border:none; border-radius:10px; cursor:pointer;
    transition:background .15s;
  }
  button:hover:not(:disabled) { background:var(--accent2); }
  button:disabled { opacity:.55; cursor:default; }
  .kana-wrap { margin-top:24px; }
  .kana-head { display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; }
  .kana-head label { margin:0; }
  .kb-toggle {
    margin:0; width:auto; padding:6px 9px; display:inline-flex; align-items:center;
    border:1px solid var(--line); border-radius:8px; background:#fff; color:var(--muted); transition:none;
  }
  .kb-toggle svg { display:block; }
  .kb-toggle:hover:not(:disabled) { background:#f0ebe0; }
  .kb-toggle.active { background:var(--accent); color:#fff; border-color:var(--accent); }
  .kb-wrap { position:relative; }
  .kbd {
    position:absolute; right:0; bottom:calc(100% + 6px); z-index:50;
    width:min(296px,92vw); max-height:190px; overflow:auto;
    background:var(--card); border:1px solid var(--line); border-radius:10px;
    box-shadow:0 6px 18px rgba(0,0,0,.16); padding:6px;
  }
  .kbd[hidden] { display:none; }
  .kbd-tabs {
    display:flex; gap:3px; position:sticky; top:0; z-index:1;
    background:var(--card); padding:6px 6px 5px; margin:-6px -6px 5px; border-bottom:1px solid var(--line);
  }
  .kbd-tabs button {
    margin:0; flex:1; padding:3px 0; font-size:10px; font-weight:600;
    background:#fff; color:var(--muted); border:1px solid var(--line); border-radius:5px; transition:none;
  }
  .kbd-tabs button.active { background:var(--accent); color:#fff; border-color:var(--accent); }
  .kbd-grid { display:grid; grid-template-columns:repeat(5,1fr); gap:3px; }
  .kbd-grid[hidden] { display:none; }
  .kbd-grid button {
    margin:0; width:100%; padding:5px 0; font-size:13px; font-weight:600;
    background:#fff; color:var(--text); border:1px solid var(--line); border-radius:5px; transition:none;
  }
  .kbd-grid button:hover:not(:disabled) { background:#f0ebe0; }
  .kbd-grid button:active { background:var(--accent); color:#fff; border-color:var(--accent); }
  .kbd-grid .spacer { visibility:hidden; }
  textarea.kana {
    width:100%; min-height:64px; resize:vertical;
    padding:12px 14px; border:1px dashed var(--line); border-radius:10px;
    background:#faf7ef; font-size:20px; letter-spacing:.5px; line-height:1.5;
    font-family:inherit; color:var(--text);
  }
  .hint { margin:8px 2px 0; font-size:12px; line-height:1.5; color:var(--muted); }
  .hint code { background:#f0ebe0; border-radius:4px; padding:1px 5px; font-size:12px; }
  .status { margin-top:12px; min-height:18px; font-size:13px; color:var(--muted); }
  .status.err { color:var(--accent2); }
</style>
</head>
<body>
  <div class="card">
    <h1>윳쿠리 보이스 🗣️</h1>
    <p class="sub">한국어를 가타카나로 변환해 AquesTalk1 음성으로 읽습니다.</p>

    <label for="text">읽을 한국어</label>
    <textarea id="text" placeholder="예) 안녕하세요. 만나서 반갑습니다.">안녕하세요. 윳쿠리 보이스입니다.</textarea>

    <div class="row">
      <div>
        <label for="voice">음성</label>
        <select id="voice">
          <option value="f1">여성 1 (f1)</option>
          <option value="f2">여성 2 (f2)</option>
          <option value="m1">남성 1 (m1)</option>
          <option value="m2">남성 2 (m2)</option>
          <option value="dvd">로봇 (dvd)</option>
          <option value="imd1">악마 (imd1)</option>
          <option value="jgr">신사 (jgr)</option>
          <option value="r1">아이 (r1)</option>
        </select>
      </div>
      <div>
        <label for="speed">속도 <span class="speedval" id="speedval">120</span></label>
        <input type="range" id="speed" min="50" max="300" step="10" value="120" />
      </div>
    </div>

    <button id="play">▶ 재생</button>

    <div class="kana-wrap">
      <div class="kana-head">
        <label for="kana">변환결과</label>
        <div class="kb-wrap">
          <button type="button" id="kbtoggle" class="kb-toggle" aria-label="가나 키보드" title="가나 키보드">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor"
                 stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <rect x="2" y="6" width="20" height="12" rx="2" />
              <line x1="6" y1="10" x2="6" y2="10" />
              <line x1="10" y1="10" x2="10" y2="10" />
              <line x1="14" y1="10" x2="14" y2="10" />
              <line x1="18" y1="10" x2="18" y2="10" />
              <line x1="8" y1="14" x2="16" y2="14" />
            </svg>
          </button>
          <div class="kbd" id="kbd" hidden>
            <div class="kbd-tabs" id="kbdtabs"></div>
            <div id="kbdbody"></div>
          </div>
        </div>
      </div>
      <textarea id="kana" placeholder="여기에 변환 결과가 표시됩니다."></textarea>
      <p class="hint">
        한국어 입력칸·가나 칸 어디든 직접 입력 —
        억양: 음 내려가는 자리에 <code>'</code> &nbsp;·&nbsp; 장음(길게): <code>-</code> 또는 <code>ー</code><br>
        예) <code>안녕'하세요</code>, <code>아-</code>
      </p>
    </div>

    <div class="status" id="status"></div>
  </div>

  <script type="module" src="./app.js"></script>
</body>
</html>
